<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>p5.js Sketch</title>
    <!-- Load the p5.js library from a reliable CDN -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1/lib/p5.min.js"></script>
</head>
<body>
<script>
var t = 0;
var y = 0;

function setup() {
    // Create a canvas for the sketch to draw on
    createCanvas(1430, 700);
    noStroke(); 
}

var draw = function() {
    background(186, 255, 232);
    fill(255, 255, 255);
    rect(0, 250, 400, 150);
    
    // Fixed: Added missing asterisks and addition signs
    y = -0.02 * t * t + 3.7 * t;
    
    var grey = 0.1 * y + 200;
    var shadowSize = 0.2 * y + 50;
    
    fill(grey, grey, grey);
    ellipse(200, 300, shadowSize, 10);
    
    var correctedY = 267 - y;
    fill(0, 64, 255);
    ellipse(200, correctedY, 50, 50);
    
    if (y < 0) {
        t = 0;
    }
    
    // Fixed: Changed `t = 5` to `t += 5`
    t += 5;
}; 
</script>
</body>
</html>
